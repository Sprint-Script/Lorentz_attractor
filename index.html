<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lorenz Attractor</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; }
  canvas { display: block; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

const DPR = window.devicePixelRatio || 1;
let W, H;

function resize() {
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * DPR;
  canvas.height = H * DPR;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.scale(DPR, DPR);
}
resize();
window.addEventListener('resize', () => {
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  resize();
});

const sigma = 10, rho = 28, beta = 8/3;
const dt = 0.004;
const MAX_POINTS = 18000;

let points = [];
let x = 0.1, y = 0, z = 0;
let rotX = 0.4, rotY = 0.3;
let isDragging = false, lastMX = 0, lastMY = 0;
let zoom = 1.4;
let autoRotate = true;

const colorPalettes = [
  { from: [0, 180, 255], to: [200, 0, 255] },
  { from: [0, 255, 140], to: [0, 120, 255] },
  { from: [255, 70,  0], to: [255, 220, 0] },
  { from: [255, 0, 110], to: [60,  0, 255] },
];
let paletteIdx = 0;

function lerpColor(a, b, t) {
  return [
    a[0] + (b[0]-a[0])*t | 0,
    a[1] + (b[1]-a[1])*t | 0,
    a[2] + (b[2]-a[2])*t | 0,
  ];
}

function stepLorenz() {
  const dx = sigma * (y - x);
  const dy = x * (rho - z) - y;
  const dz = x * y - beta * z;
  x += dx * dt;
  y += dy * dt;
  z += dz * dt;
  return [x, y, z];
}

function project(px, py, pz) {
  const cosY = Math.cos(rotY), sinY = Math.sin(rotY);
  const rx = cosY * px + sinY * pz;
  const ry = py;
  const rz = -sinY * px + cosY * pz;

  const cosX = Math.cos(rotX), sinX = Math.sin(rotX);
  const fy = cosX * ry - sinX * rz;
  const fz = sinX * ry + cosX * rz;

  const fov = 460 * zoom;
  const scale = fov / (fz + 240);
  return [rx * scale + W/2, fy * scale + H/2, scale];
}

function drawAxis(ax, ay, az, bx, by, bz, color, label) {
  const [sx, sy] = project(ax, ay, az);
  const [ex, ey] = project(bx, by, bz);

  ctx.save();
  ctx.beginPath();
  ctx.moveTo(sx, sy);
  ctx.lineTo(ex, ey);
  ctx.strokeStyle = color;
  ctx.lineWidth = 0.8;
  ctx.setLineDash([5, 5]);
  ctx.globalAlpha = 0.4;
  ctx.stroke();
  ctx.setLineDash([]);

  // Arrowhead
  const angle = Math.atan2(ey - sy, ex - sx);
  const al = 7;
  ctx.beginPath();
  ctx.moveTo(ex, ey);
  ctx.lineTo(ex - al * Math.cos(angle - 0.38), ey - al * Math.sin(angle - 0.38));
  ctx.lineTo(ex - al * Math.cos(angle + 0.38), ey - al * Math.sin(angle + 0.38));
  ctx.closePath();
  ctx.fillStyle = color;
  ctx.globalAlpha = 0.5;
  ctx.fill();

  ctx.font = '600 10px monospace';
  ctx.fillStyle = color;
  ctx.globalAlpha = 0.6;
  ctx.fillText(label, ex + 5, ey + 4);
  ctx.restore();
}

function drawAxes() {
  const len = 30;
  drawAxis(-len,0,0,  len,0,0,  'rgba(255,90,90,1)',   'X');
  drawAxis(0,-len,0,  0,len,0,  'rgba(80,255,150,1)',  'Y');
  drawAxis(0,0,-len,  0,0,len,  'rgba(80,160,255,1)',  'Z');
}

function draw() {
  // Fade trail
  ctx.fillStyle = 'rgba(0,0,0,0.22)';
  ctx.fillRect(0, 0, W, H);

  drawAxes();

  const pal = colorPalettes[paletteIdx];
  const n = points.length;
  if (n < 2) return;

  // Batch draw by color segments for performance
  for (let i = 1; i < n; i++) {
    const t = i / n;
    const [r, g, b] = lerpColor(pal.from, pal.to, t);
    const alpha = 0.08 + t * 0.92;
    const [x1, y1]     = project(...points[i-1]);
    const [x2, y2, s2] = project(...points[i]);

    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.strokeStyle = `rgba(${r},${g},${b},${alpha})`;
    ctx.lineWidth = Math.max(0.4, s2 * 0.5);
    ctx.stroke();
  }

  // Glowing head
  const [hx, hy, hs] = project(...points[n-1]);
  const [r, g, b] = pal.to;
  ctx.save();
  ctx.shadowColor = `rgb(${r},${g},${b})`;
  ctx.shadowBlur = 18 * DPR;
  ctx.beginPath();
  ctx.arc(hx, hy, Math.max(1.5, hs * 1.2), 0, Math.PI*2);
  ctx.fillStyle = `rgba(${r},${g},${b},0.95)`;
  ctx.fill();
  ctx.restore();
}

const STEPS = 9;
function animate() {
  requestAnimationFrame(animate);
  if (autoRotate && !isDragging) rotY += 0.002;
  for (let i = 0; i < STEPS; i++) {
    points.push([...stepLorenz()]);
    if (points.length > MAX_POINTS) points.shift();
  }
  draw();
}

canvas.addEventListener('mousedown', e => {
  isDragging = true; autoRotate = false;
  lastMX = e.clientX; lastMY = e.clientY;
});
window.addEventListener('mouseup', () => isDragging = false);
window.addEventListener('mousemove', e => {
  if (!isDragging) return;
  rotY += (e.clientX - lastMX) * 0.006;
  rotX += (e.clientY - lastMY) * 0.006;
  lastMX = e.clientX; lastMY = e.clientY;
});
canvas.addEventListener('wheel', e => {
  zoom *= e.deltaY > 0 ? 0.93 : 1.07;
  zoom = Math.max(0.3, Math.min(6, zoom));
}, { passive: true });

canvas.addEventListener('touchstart', e => {
  isDragging = true; autoRotate = false;
  lastMX = e.touches[0].clientX; lastMY = e.touches[0].clientY;
}, { passive: true });
canvas.addEventListener('touchend', () => isDragging = false);
canvas.addEventListener('touchmove', e => {
  if (!isDragging) return;
  rotY += (e.touches[0].clientX - lastMX) * 0.006;
  rotX += (e.touches[0].clientY - lastMY) * 0.006;
  lastMX = e.touches[0].clientX; lastMY = e.touches[0].clientY;
}, { passive: true });

animate();
</script>
</body>
</html>
