<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lorenz Attractor</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    overflow: hidden;
    font-family: 'Share Tech Mono', monospace;
    color: #fff;
  }

  canvas {
    display: block;
    position: fixed;
    top: 0; left: 0;
  }

  #ui {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 10;
  }

  #title {
    position: absolute;
    top: 32px; left: 40px;
    font-family: 'Bebas Neue', cursive;
    font-size: 3.2rem;
    letter-spacing: 0.15em;
    color: #fff;
    line-height: 1;
    text-shadow: 0 0 40px rgba(0,200,255,0.6), 0 0 80px rgba(0,200,255,0.2);
  }

  #subtitle {
    position: absolute;
    top: 104px; left: 42px;
    font-size: 0.65rem;
    letter-spacing: 0.3em;
    color: rgba(0,200,255,0.55);
    text-transform: uppercase;
  }

  #params {
    position: absolute;
    bottom: 36px; left: 40px;
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    color: rgba(255,255,255,0.3);
    line-height: 2;
  }

  #params span { color: rgba(0,200,255,0.7); }

  #controls {
    position: absolute;
    bottom: 36px; right: 40px;
    font-size: 0.62rem;
    letter-spacing: 0.12em;
    color: rgba(255,255,255,0.25);
    line-height: 2.2;
    text-align: right;
    pointer-events: all;
  }

  #controls button {
    display: block;
    margin-left: auto;
    margin-top: 10px;
    padding: 7px 18px;
    background: transparent;
    border: 1px solid rgba(0,200,255,0.3);
    color: rgba(0,200,255,0.7);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.2em;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  #controls button:hover {
    background: rgba(0,200,255,0.08);
    border-color: rgba(0,200,255,0.8);
    color: #fff;
    box-shadow: 0 0 16px rgba(0,200,255,0.3);
  }

  #scanline {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px,
      transparent 3px,
      rgba(0,0,0,0.04) 3px,
      rgba(0,0,0,0.04) 4px
    );
    pointer-events: none;
    z-index: 20;
  }

  #vignette {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.75) 100%);
    pointer-events: none;
    z-index: 9;
  }
</style>
</head>
<body>

<canvas id="c"></canvas>
<div id="vignette"></div>
<div id="scanline"></div>

<div id="ui">
  <div id="title">Lorenz<br>Attractor</div>
  <div id="subtitle">Deterministic Chaos System</div>

  <div id="params">
    σ = <span id="pSigma">10.000</span><br>
    ρ = <span id="pRho">28.000</span><br>
    β = <span id="pBeta">2.667</span><br>
    dt = <span id="pDt">0.005</span>
  </div>

  <div id="controls">
    DRAG TO ROTATE<br>
    SCROLL TO ZOOM<br>
    <button id="btnReset">RESET</button>
    <button id="btnColor">CYCLE COLOR</button>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// Lorenz params
const sigma = 10, rho = 28, beta = 8/3;
const dt = 0.005;
const MAX_POINTS = 8000;

// State
let points = [];
let x = 0.1, y = 0, z = 0;
let rotX = 0.4, rotY = 0.3;
let isDragging = false, lastMX = 0, lastMY = 0;
let zoom = 1;
let autoRotate = true;
let frame = 0;

const colorPalettes = [
  { from: [0, 180, 255], to: [180, 0, 255] },
  { from: [0, 255, 140], to: [0, 140, 255] },
  { from: [255, 80, 0],  to: [255, 220, 0] },
  { from: [255, 0, 120], to: [80, 0, 255] },
  { from: [0, 255, 220], to: [255, 255, 100] },
];
let paletteIdx = 0;

function lerpColor(a, b, t) {
  return [
    Math.round(a[0] + (b[0]-a[0])*t),
    Math.round(a[1] + (b[1]-a[1])*t),
    Math.round(a[2] + (b[2]-a[2])*t),
  ];
}

function stepLorenz() {
  const dx = sigma * (y - x);
  const dy = x * (rho - z) - y;
  const dz = x * y - beta * z;
  x += dx * dt;
  y += dy * dt;
  z += dz * dt;
  return [x, y, z];
}

// 3D → 2D projection
function project(px, py, pz) {
  // rotate Y
  const cosY = Math.cos(rotY), sinY = Math.sin(rotY);
  let rx = cosY * px + sinY * pz;
  let ry = py;
  let rz = -sinY * px + cosY * pz;

  // rotate X
  const cosX = Math.cos(rotX), sinX = Math.sin(rotX);
  let fy = cosX * ry - sinX * rz;
  let fz = sinX * ry + cosX * rz;
  rx = rx;

  // perspective
  const fov = 420 * zoom;
  const zOff = fz + 80;
  const scale = fov / (zOff + 160);
  return [rx * scale + W/2, fy * scale + H/2, scale];
}

function draw() {
  ctx.clearRect(0, 0, W, H);

  // dark trail fill
  ctx.fillStyle = 'rgba(0,0,0,0.18)';
  ctx.fillRect(0, 0, W, H);

  const pal = colorPalettes[paletteIdx];
  const n = points.length;

  for (let i = 1; i < n; i++) {
    const t = i / n;
    const [r, g, b] = lerpColor(pal.from, pal.to, t);
    const alpha = 0.15 + t * 0.85;
    const [x1, y1, s1] = project(...points[i-1]);
    const [x2, y2, s2] = project(...points[i]);

    const lw = Math.max(0.4, s2 * 0.6);
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.strokeStyle = `rgba(${r},${g},${b},${alpha})`;
    ctx.lineWidth = lw;
    ctx.stroke();
  }

  // draw current head with glow
  if (n > 0) {
    const [hx, hy, hs] = project(...points[n-1]);
    const [r, g, b] = pal.to;
    ctx.beginPath();
    ctx.arc(hx, hy, hs * 1.2, 0, Math.PI*2);
    ctx.fillStyle = `rgba(${r},${g},${b},0.9)`;
    ctx.shadowColor = `rgb(${r},${g},${b})`;
    ctx.shadowBlur = 12;
    ctx.fill();
    ctx.shadowBlur = 0;
  }
}

const STEPS_PER_FRAME = 6;

function animate() {
  requestAnimationFrame(animate);
  frame++;

  if (autoRotate && !isDragging) {
    rotY += 0.0025;
  }

  for (let i = 0; i < STEPS_PER_FRAME; i++) {
    const pt = stepLorenz();
    points.push([...pt]);
    if (points.length > MAX_POINTS) points.shift();
  }

  draw();
}

// Mouse controls
canvas.addEventListener('mousedown', e => {
  isDragging = true; autoRotate = false;
  lastMX = e.clientX; lastMY = e.clientY;
});
window.addEventListener('mouseup', () => { isDragging = false; });
window.addEventListener('mousemove', e => {
  if (!isDragging) return;
  rotY += (e.clientX - lastMX) * 0.007;
  rotX += (e.clientY - lastMY) * 0.007;
  lastMX = e.clientX; lastMY = e.clientY;
});
canvas.addEventListener('wheel', e => {
  zoom *= e.deltaY > 0 ? 0.93 : 1.07;
  zoom = Math.max(0.3, Math.min(4, zoom));
}, { passive: true });

// Touch support
canvas.addEventListener('touchstart', e => {
  isDragging = true; autoRotate = false;
  lastMX = e.touches[0].clientX; lastMY = e.touches[0].clientY;
}, { passive: true });
canvas.addEventListener('touchend', () => { isDragging = false; });
canvas.addEventListener('touchmove', e => {
  if (!isDragging) return;
  rotY += (e.touches[0].clientX - lastMX) * 0.007;
  rotX += (e.touches[0].clientY - lastMY) * 0.007;
  lastMX = e.touches[0].clientX; lastMY = e.touches[0].clientY;
}, { passive: true });

document.getElementById('btnReset').addEventListener('click', () => {
  x = 0.1 + Math.random()*0.01; y = 0; z = 0;
  points = [];
  rotX = 0.4; rotY = 0.3;
  autoRotate = true;
});

document.getElementById('btnColor').addEventListener('click', () => {
  paletteIdx = (paletteIdx + 1) % colorPalettes.length;
});

// Update param display
document.getElementById('pSigma').textContent = sigma.toFixed(3);
document.getElementById('pRho').textContent = rho.toFixed(3);
document.getElementById('pBeta').textContent = beta.toFixed(3);
document.getElementById('pDt').textContent = dt.toFixed(3);

animate();
</script>
</body>
</html>
